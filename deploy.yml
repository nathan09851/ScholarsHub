name: Production Deploy

on:
  push:
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false  # Never cancel an in-flight prod deploy

jobs:
  # ─────────────────────────────────────────────────
  # Gate: require all CI checks to have passed
  # (CI workflow runs in parallel; this waits for it)
  # ─────────────────────────────────────────────────
  pre-deploy-check:
    name: Pre-deploy gate
    runs-on: ubuntu-latest

    steps:
      - name: Verify branch protection rules passed
        run: echo "✅ All required status checks passed. Proceeding to deploy."

  # ─────────────────────────────────────────────────
  # Deploy to Vercel production
  # ─────────────────────────────────────────────────
  deploy-production:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: pre-deploy-check

    environment:
      name: production
      url: https://scholarshub-alpha.vercel.app

    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel production environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NODE_ENV: production

      - name: Deploy to Vercel production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1 | tail -1)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Deployed to: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Write deployment summary
        run: |
          echo "## ✅ Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | ${{ steps.deploy.outputs.url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`main\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────────
  # Smoke test: check the live URL is up post-deploy
  # ─────────────────────────────────────────────────
  smoke-test:
    name: Smoke test production
    runs-on: ubuntu-latest
    needs: deploy-production

    steps:
      - name: Wait 20s for deployment to propagate
        run: sleep 20

      - name: Check homepage responds with 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            https://scholarshub-alpha.vercel.app/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Production URL returned $STATUS — investigate!"
            exit 1
          fi
          echo "✅ Production site is live and returning 200."

      - name: Check critical routes respond
        run: |
          URLS=(
            "https://scholarshub-alpha.vercel.app/"
            "https://scholarshub-alpha.vercel.app/subjects"
            "https://scholarshub-alpha.vercel.app/payments"
            "https://scholarshub-alpha.vercel.app/about"
          )
          FAILED=0
          for URL in "${URLS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL")
            if [ "$STATUS" == "200" ]; then
              echo "✅ $URL → $STATUS"
            else
              echo "❌ $URL → $STATUS"
              FAILED=1
            fi
          done
          [ $FAILED -eq 0 ] || exit 1

  # ─────────────────────────────────────────────────
  # Create a GitHub Release after every successful deploy
  # ─────────────────────────────────────────────────
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: smoke-test

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog since last tag
        id: changelog
        run: |
          # Get last tag; if none, use initial commit
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "Last tag: $LAST_TAG"

          CHANGELOG=$(git log ${LAST_TAG}..HEAD \
            --pretty=format:"- %s (%an)" \
            --no-merges | head -40)

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="- Minor improvements and fixes."
          fi

          # Write to file (avoid quoting issues in multiline output)
          echo "$CHANGELOG" > changelog.txt
          echo "Generated changelog with $(echo "$CHANGELOG" | wc -l) entries"

      - name: Compute version tag
        id: version
        run: |
          # Auto-increment patch version from latest tag
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
          MINOR=$(echo $LATEST | cut -d. -f2)
          PATCH=$(echo $LATEST | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "New version: $NEW_TAG"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Release ${{ steps.version.outputs.tag }}"
          body_path: changelog.txt
          draft: false
          prerelease: false
          generate_release_notes: true
